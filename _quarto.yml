project:
  type: website
  render:
    - "*.qmd"
    - "posts/**/*.qmd"
    - "consulting/**/*.qmd"
    - "randomposts/**/*.qmd"

website:
  title: "Farrukh Nauman"
  site-url: https://fnauman.com
  description: "Principal consultant specializing in enterprise data-platform migrations, warehouse cost optimization, analytics automation with coding agents, and time series / telemetry ML."
  navbar:
    title: false
    left:
      - href: index.qmd
        text: Home
      - href: consulting.qmd
        text: Selected Work
      - href: posts.qmd
        text: Writing
      - href: cv.qmd
        text: CV
      - href: contact.qmd
        text: Work With Me

    right:
      - icon: github
        href: https://github.com/fnauman
      - icon: x
        href: https://x.com/naumanf_
      - icon: linkedin
        href: https://www.linkedin.com/in/fnauman/
      - icon: envelope
        aria-label: email
        href: "mailto:farrukh.nauman@inertialrange.com"  
  
  page-footer:
    left: "Copyright 2026, Farrukh Nauman"
    right: 
      - icon: github
        href: https://github.com/fnauman
      - icon: x
        href: https://x.com/naumanf_
      - icon: linkedin
        href: https://www.linkedin.com/in/fnauman/
      - icon: envelope
        aria-label: email
        href: "mailto:farrukh.nauman@inertialrange.com"  
  
  google-analytics: G-9BN5NTZ1J1
  open-graph: true
  twitter-card: 
    creator: "@naumanf_" 
    site: "@naumanf_"

format:
  html:
    theme: 
      light: [cosmo, theme.scss]
      dark: [cosmo, theme-dark.scss]
    css: styles.css
    code-copy: true
    code-overflow: wrap
    toc: true
    page-layout: full
    grid:
      sidebar-width: 250px
      body-width: 900px
      margin-width: 300px
